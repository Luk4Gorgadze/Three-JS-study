<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Motion cubes</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;600&display=swap"
    />
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      .Name {
        font-family: "Oswald", sans-serif;
        color: #ffffff;
        font-size: 30px;
      }

      .subHeader {
        font-family: "Oswald", sans-serif;
        font-size: 18px;
        color: #ffffff;
      }

      .SubPB {
        font-family: "Inter", sans-serif;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
      }

      .SubP {
        font-family: "Inter", sans-serif;
        color: #ffffff;
        font-size: 14px;
        font-weight: 100;
      }
      .UI {
        position: fixed;
        margin: 0;
        width: 100%;
        height: 100%;
        padding: 20px 40px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
      }
      .UI * {
        pointer-events: none;
      }
      .Links,
      .Link {
        pointer-events: auto;
      }
      .Link {
        font-family: "Inter", sans-serif;
        color: #ffffff;
        font-size: 14px;
        font-weight: 100;
        text-decoration: none;
      }
      .FB-1 {
        margin-top: 40px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        max-width: 1200px;
      }
      .FB-2 {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        max-width: 1200px;
      }

      .FB-25 {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        max-width: 1200px;
        gap: 20px;
      }

      .Rotated {
        display: flex;
        gap: 20px;
        align-items: center;
        transform: rotate(-90deg);
        position: relative;
        transform-origin: bottom right;
        /* right: -44%; */
        /* top: 70px; */
      }
      .Rotated-2 {
        display: flex;
        gap: 20px;
        align-items: center;
        transform: rotate(180deg);
        position: relative;
        /* right: -44%; */
        /* top: 70px; */
      }
      .A {
        font-family: "Oswald", sans-serif;
        color: #ffffff;
        font-size: 250px;
        height: 350px;
        text-align: center;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="UI">
      <div class="FB-1">
        <!-- LEFT -->
        <div class="Author">
          <div class="Name">LUKING</div>
          <div>
            <div class="SubPB" style="margin-top: 20px; margin-bottom: 5px">
              SSGI, Lights and Reflections
            </div>
            <div class="SubP">Motion cubes</div>
            <div
              style="
                border-bottom: 3px solid #ffffff;
                width: 20px;
                margin-top: 10px;
              "
            ></div>
          </div>
        </div>
        <div>
          <!-- Right -->
          <div class="Rotated">
            <div class="Rotated-2">
              <image
                src="./icons/Cube-Logo.png"
                alt="Pointer Icon"
                style="
                  width: 20px;
                  height: 20px;
                  transform: rotate(-90deg);
                  margin-left: 10px;
                "
              />
              <div class="SubPB">DRAG POINTER</div>
              <div
                style="
                  border: 5px solid #ffffff;
                  border-radius: 50%;
                  width: 5px;
                  height: 5px;
                  background-color: #ffffff;
                "
              ></div>
            </div>
          </div>
        </div>
      </div>
      <div class="FB-25">
        <div class="FB-2">
          <!-- Left -->
          <div>
            <div class="A">A</div>
            <div class="SubPB" style="margin-bottom: 5px">
              Abstract Minimalism
            </div>
            <div class="SubP">Pythagorean Mathematics</div>
          </div>
          <!-- Right -->
          <div>
            <div class="A">_01</div>
            <div
              style="
                display: flex;
                gap: 10px;
                align-items: end;
                justify-content: flex-end;
              "
              class="Links"
            >
              <a
                class="Link"
                href="https://github.com/Luk4Gorgadze"
                target="_blank"
              >
                github</a
              >
              <a
                class="Link"
                href="https://www.linkedin.com/in/luka-gorgadze/"
                target="_blank"
              >
                linkedin</a
              >
              <a
                class="Link"
                href="https://www.instagram.com/luking.digital/"
                target="_blank"
              >
                instagram</a
              >
            </div>
          </div>
        </div>
        <div class="subHeader" style="margin: auto; margin-bottom: 20px">
          MOTION WITHOUT LIMITS
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
